<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소셜 콘텐츠 자동 검수 시스템</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://js.puter.com/v2/"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:#1B3A6B; --blue:#2E75B6; --blue-l:#E8F2FB;
  --red:#C0392B; --red-l:#FDECEA;
  --amber:#92600A; --amber-l:#FEF3DC; --amber-b:#F5C57A;
  --green:#1A7A4A; --green-l:#E8F6EE; --green-b:#8FCB9B;
  --g0:#fff; --g1:#F7F8FA; --g2:#F0F2F5; --g3:#E4E7EC;
  --g4:#9CA3AF; --g5:#6B7280; --g6:#374151; --g7:#111827;
  --r:8px; --font:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;
}
body { font-family:var(--font); background:#EEF2F8; color:var(--g7); min-height:100vh; padding:24px 16px 60px; }
.page { max-width:720px; margin:0 auto; }

.hdr { background:var(--navy); border-radius:16px; padding:22px 26px; margin-bottom:16px; display:flex; align-items:center; gap:14px; }
.hdr-ico { width:48px; height:48px; background:rgba(255,255,255,.15); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:24px; color:#fff; flex-shrink:0; }
.hdr h1 { font-size:17px; font-weight:700; color:#fff; margin-bottom:3px; }
.hdr p { font-size:12px; color:rgba(255,255,255,.65); line-height:1.5; }
.hdr-badge { display:inline-flex; align-items:center; gap:4px; background:rgba(255,255,255,.15); color:#fff; border-radius:20px; font-size:11px; font-weight:700; padding:3px 10px; margin-top:6px; }

.card { background:var(--g0); border-radius:14px; padding:18px 20px; margin-bottom:14px; border:1px solid var(--g3); }
.card-ttl { font-size:12px; font-weight:700; color:var(--g5); text-transform:uppercase; letter-spacing:.05em; margin-bottom:14px; display:flex; align-items:center; gap:5px; }
.card-ttl i { font-size:14px; color:var(--blue); }

/* info banner */
.info-banner { background:var(--green-l); border:1.5px solid var(--green-b); border-radius:12px; padding:14px 16px; margin-bottom:14px; display:flex; align-items:flex-start; gap:10px; }
.info-banner i { font-size:20px; color:var(--green); flex-shrink:0; margin-top:1px; }
.info-banner p { font-size:13px; color:#145A38; line-height:1.6; }
.info-banner strong { font-weight:700; }

/* Upload */
.upload-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.ubox { border:2px dashed var(--g3); border-radius:12px; padding:18px 12px; cursor:pointer; text-align:center; background:var(--g1); transition:border-color .15s,background .15s; min-height:110px; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; }
.ubox:hover { border-color:var(--blue); background:var(--blue-l); }
.ubox.on { border-style:solid; border-color:var(--blue); background:var(--blue-l); }
.ubox .ui { font-size:28px; color:var(--g4); margin-bottom:6px; }
.ubox.on .ui { color:var(--blue); }
.ubox .ul { font-size:13px; font-weight:600; color:var(--g5); }
.ubox.on .ul { color:var(--blue); }
.ubox .us { font-size:11px; color:var(--g4); margin-top:2px; }
.pg { display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; justify-content:center; }
.pi { position:relative; width:48px; height:48px; }
.pi img { width:48px; height:48px; object-fit:cover; border-radius:6px; border:1px solid var(--g3); display:block; }
.pi .vt { width:48px; height:48px; background:var(--g2); border-radius:6px; display:flex; align-items:center; justify-content:center; border:1px solid var(--g3); }
.pi .vt i { font-size:18px; color:var(--g4); }
.pi .rb { position:absolute; top:-5px; right:-5px; width:15px; height:15px; border-radius:50%; background:var(--g6); color:#fff; border:none; cursor:pointer; font-size:10px; display:flex; align-items:center; justify-content:center; }
input[type=file] { display:none; }

.fl { font-size:12px; font-weight:600; color:var(--g6); display:block; margin-bottom:6px; }
textarea { width:100%; min-height:96px; font-size:14px; font-family:var(--font); padding:11px 13px; border-radius:var(--r); border:1.5px solid var(--g3); background:var(--g1); color:var(--g7); resize:vertical; transition:border-color .15s; }
textarea:focus { outline:none; border-color:var(--blue); background:#fff; }
textarea::placeholder { color:var(--g4); }
.ctx { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px; margin-bottom:16px; }
select, input[type=date] { width:100%; font-size:13px; font-family:var(--font); padding:9px 11px; border-radius:var(--r); border:1.5px solid var(--g3); background:var(--g1); color:var(--g7); cursor:pointer; }
select:focus, input[type=date]:focus { outline:none; border-color:var(--blue); }

.btn-run { width:100%; padding:13px; border-radius:10px; border:none; background:var(--navy); color:#fff; font-size:15px; font-weight:700; font-family:var(--font); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:background .15s; }
.btn-run:hover { background:#152E56; }
.btn-run:disabled { background:var(--g3); color:var(--g4); cursor:not-allowed; }
.btn-run i { font-size:18px; }
.btn-hint { font-size:12px; color:var(--g4); text-align:center; margin-top:7px; }
.btn-reset { display:block; width:100%; margin-top:10px; padding:10px; border-radius:var(--r); border:1.5px solid var(--g3); background:var(--g0); font-size:13px; color:var(--g5); font-family:var(--font); cursor:pointer; }
.btn-reset:hover { background:var(--g1); }

.loading { text-align:center; padding:40px 20px; }
.spinner { width:38px; height:38px; border:3px solid var(--g3); border-top-color:var(--blue); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 12px; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading p { font-size:14px; color:var(--g6); }
.lstep { font-size:12px; color:var(--g4); margin-top:5px; }

.banner { border-radius:12px; padding:16px 18px; margin-bottom:18px; display:flex; align-items:center; gap:12px; }
.banner.pass { background:var(--green-l); border:1.5px solid var(--green-b); }
.banner.warn { background:var(--amber-l); border:1.5px solid var(--amber-b); }
.banner.fail { background:var(--red-l); border:1.5px solid #F0A0A0; }
.banner .bico { font-size:30px; flex-shrink:0; }
.banner.pass .bico { color:var(--green); } .banner.warn .bico { color:var(--amber); } .banner.fail .bico { color:var(--red); }
.btxt { flex:1; }
.bv { font-size:17px; font-weight:700; color:var(--g7); }
.br { font-size:12px; color:var(--g5); margin-top:3px; line-height:1.5; }
.bs { font-size:32px; font-weight:700; flex-shrink:0; }
.banner.pass .bs { color:var(--green); } .banner.warn .bs { color:var(--amber); } .banner.fail .bs { color:var(--red); }
.bsu { font-size:14px; font-weight:400; }

.cgroup { margin-bottom:16px; }
.cg-lbl { font-size:11px; font-weight:700; color:var(--g4); text-transform:uppercase; letter-spacing:.07em; margin-bottom:7px; padding-left:2px; }
.ci { display:flex; align-items:flex-start; gap:9px; padding:10px 13px; border-radius:var(--r); border:1px solid var(--g3); background:var(--g1); margin-bottom:5px; }
.ci.ok   { background:var(--green-l); border-color:var(--green-b); }
.ci.warn { background:var(--amber-l); border-color:var(--amber-b); }
.ci.fail { background:var(--red-l);   border-color:#F0A0A0; }
.ci.skip { opacity:.5; }
.ci-ico { font-size:16px; flex-shrink:0; margin-top:1px; }
.ci.ok .ci-ico { color:var(--green); } .ci.warn .ci-ico { color:var(--amber); }
.ci.fail .ci-ico { color:var(--red); } .ci.skip .ci-ico { color:var(--g4); }
.ci-lbl { font-size:13px; font-weight:600; color:var(--g7); line-height:1.4; display:flex; align-items:center; flex-wrap:wrap; gap:5px; }
.ci-note { font-size:12px; color:var(--g5); margin-top:3px; line-height:1.55; }
.tag { display:inline-block; font-size:10px; font-weight:700; padding:2px 7px; border-radius:20px; }
.tag.req  { background:#FDECEA; color:#A93226; }
.tag.caut { background:var(--amber-l); color:var(--amber); border:1px solid var(--amber-b); }
.tag.chk  { background:var(--blue-l); color:var(--blue); }

.abox { background:var(--g1); border-radius:10px; border:1.5px solid var(--g3); padding:14px 16px; margin-top:4px; }
.abox-ttl { font-size:13px; font-weight:700; color:var(--g7); margin-bottom:9px; display:flex; align-items:center; gap:5px; }
.abox-ttl i { color:var(--blue); font-size:15px; }
.alist { list-style:none; }
.alist li { font-size:12px; color:var(--g5); padding:5px 0; border-bottom:1px solid var(--g3); display:flex; align-items:flex-start; gap:7px; line-height:1.55; }
.alist li:last-child { border:none; }
.alist li::before { content:"→"; color:var(--blue); flex-shrink:0; }
.res-foot { text-align:center; font-size:11px; color:var(--g4); margin-top:14px; }

/* puter login overlay */
.login-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); display:flex; align-items:center; justify-content:center; z-index:9999; }
.login-box { background:#fff; border-radius:16px; padding:28px 24px; max-width:340px; width:90%; text-align:center; }
.login-box i { font-size:40px; color:var(--blue); display:block; margin-bottom:12px; }
.login-box h2 { font-size:17px; font-weight:700; color:var(--g7); margin-bottom:8px; }
.login-box p { font-size:13px; color:var(--g5); line-height:1.6; margin-bottom:18px; }
.btn-login { display:inline-flex; align-items:center; gap:8px; padding:11px 24px; border-radius:10px; border:none; background:var(--navy); color:#fff; font-size:14px; font-weight:700; font-family:var(--font); cursor:pointer; }
.btn-login:hover { background:#152E56; }

@media (max-width:520px) { .upload-grid,.ctx { grid-template-columns:1fr; } .hdr { flex-direction:column; text-align:center; } }
</style>
</head>
<body>
<div class="page">

  <div class="hdr">
    <div class="hdr-ico"><i class="ti ti-shield-check"></i></div>
    <div>
      <h1>소셜 콘텐츠 자동 검수 시스템</h1>
      <p>이미지·영상·캡션을 업로드하면 AI가 가이드라인 기준으로 리스크를 분석합니다</p>
      <div class="hdr-badge"><i class="ti ti-sparkles" style="font-size:12px"></i> 완전 무료 · API 키 불필요</div>
    </div>
  </div>

  <div class="info-banner">
    <i class="ti ti-info-circle"></i>
    <p><strong>API 키 없이 무료로 사용 가능합니다.</strong><br>
    처음 실행 시 Puter 무료 계정으로 로그인만 하면 됩니다. Google 계정으로 간편 로그인 가능하며, 이후 바로 사용할 수 있습니다.</p>
  </div>

  <div class="card">
    <div class="card-ttl"><i class="ti ti-upload"></i> 콘텐츠 업로드</div>

    <div class="upload-grid">
      <div class="ubox" id="img-box" onclick="document.getElementById('img-in').click()">
        <i class="ti ti-photo ui"></i>
        <div class="ul">이미지 업로드</div>
        <div class="us">JPG, PNG, GIF, WEBP</div>
        <div class="pg" id="img-prev" onclick="event.stopPropagation()"></div>
      </div>
      <div class="ubox" id="vid-box" onclick="document.getElementById('vid-in').click()">
        <i class="ti ti-video ui"></i>
        <div class="ul">영상 업로드</div>
        <div class="us">MP4, MOV, AVI (썸네일 분석)</div>
        <div class="pg" id="vid-prev" onclick="event.stopPropagation()"></div>
      </div>
    </div>
    <input type="file" id="img-in" accept="image/*" multiple>
    <input type="file" id="vid-in" accept="video/*" multiple>

    <label class="fl" for="caption">캡션 / 본문 텍스트</label>
    <textarea id="caption" placeholder="게시할 캡션, 해시태그, 이벤트 문구 등을 입력하세요..."></textarea>

    <div class="ctx">
      <div>
        <label class="fl" for="channel">발행 채널</label>
        <select id="channel">
          <option value="instagram">인스타그램</option>
          <option value="youtube">유튜브</option>
          <option value="tiktok">틱톡</option>
          <option value="blog">블로그</option>
          <option value="facebook">페이스북</option>
          <option value="twitter">X(트위터)</option>
        </select>
      </div>
      <div>
        <label class="fl" for="pubdate">발행 예정일 (선택)</label>
        <input type="date" id="pubdate">
      </div>
    </div>

    <button class="btn-run" id="run-btn" onclick="runAnalysis()" disabled>
      <i class="ti ti-robot"></i> AI 검수 시작
    </button>
    <p class="btn-hint" id="run-hint">이미지 또는 텍스트 중 하나 이상 입력하세요</p>
  </div>

  <div id="result"></div>
</div>

<script>
const imgFiles=[], vidFiles=[];

function updateBtn(){
  const ok=imgFiles.length>0||vidFiles.length>0||document.getElementById('caption').value.trim().length>0;
  document.getElementById('run-btn').disabled=!ok;
  document.getElementById('run-hint').textContent=ok?'':'이미지 또는 텍스트 중 하나 이상 입력하세요';
}
document.getElementById('caption').addEventListener('input',updateBtn);

document.getElementById('img-in').addEventListener('change',function(e){
  Array.from(e.target.files).forEach(f=>{
    if(imgFiles.find(x=>x.name===f.name))return;
    imgFiles.push(f);
    document.getElementById('img-box').classList.add('on');
    const d=document.createElement('div');d.className='pi';
    d.innerHTML=`<img src="${URL.createObjectURL(f)}" alt="${f.name}"><button class="rb" onclick="rmF('img','${f.name}',this.parentNode)">×</button>`;
    document.getElementById('img-prev').appendChild(d);
  });
  updateBtn();
});

document.getElementById('vid-in').addEventListener('change',function(e){
  Array.from(e.target.files).forEach(f=>{
    if(vidFiles.find(x=>x.name===f.name))return;
    vidFiles.push(f);
    document.getElementById('vid-box').classList.add('on');
    const d=document.createElement('div');d.className='pi';
    d.innerHTML=`<div class="vt"><i class="ti ti-movie"></i></div><button class="rb" onclick="rmF('vid','${f.name}',this.parentNode)">×</button>`;
    document.getElementById('vid-prev').appendChild(d);
  });
  updateBtn();
});

function rmF(type,name,node){
  const arr=type==='img'?imgFiles:vidFiles;
  const i=arr.findIndex(x=>x.name===name);
  if(i>-1)arr.splice(i,1);
  node.remove();
  if(type==='img'&&!imgFiles.length)document.getElementById('img-box').classList.remove('on');
  if(type==='vid'&&!vidFiles.length)document.getElementById('vid-box').classList.remove('on');
  updateBtn();
}

async function toB64(file){
  return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
}

async function vidThumb(file){
  return new Promise(res=>{
    const v=document.createElement('video');v.src=URL.createObjectURL(file);
    v.addEventListener('loadeddata',()=>{v.currentTime=1;});
    v.addEventListener('seeked',()=>{
      const c=document.createElement('canvas');c.width=320;c.height=180;
      c.getContext('2d').drawImage(v,0,0,320,180);
      res(c.toDataURL('image/jpeg'));
    });
    v.addEventListener('error',()=>res(null));
  });
}

async function runAnalysis(){
  const caption=document.getElementById('caption').value.trim();
  const channel=document.getElementById('channel').value;
  const pubDate=document.getElementById('pubdate').value;
  const chNames={instagram:'인스타그램',youtube:'유튜브',tiktok:'틱톡',blog:'블로그',facebook:'페이스북',twitter:'X(트위터)'};

  document.getElementById('result').innerHTML=`<div class="card"><div class="loading"><div class="spinner"></div><p>AI가 콘텐츠를 분석하고 있습니다</p><div class="lstep" id="lstep">가이드라인 항목 대조 중...</div></div></div>`;

  const steps=['이미지 비주얼 요소 분석 중...','텍스트 맥락 검토 중...','리스크 항목 대조 중...','최종 판정 생성 중...'];
  let si=0;
  const iv=setInterval(()=>{const el=document.getElementById('lstep');if(el&&si<steps.length)el.textContent=steps[si++];},1400);

  try{
    // 이미지를 텍스트 설명으로 먼저 변환 (Puter AI chat은 텍스트 기반)
    // 이미지가 있으면 별도로 vision 분석 후 텍스트 요약을 만들어서 함께 전송
    let imageDesc='';

    if(imgFiles.length>0||vidFiles.length>0){
      const visionParts=[];
      for(const f of imgFiles){
        const b64=await toB64(f);
        visionParts.push({type:'image_url',image_url:{url:`data:${f.type||'image/jpeg'};base64,${b64}`}});
      }
      for(const f of vidFiles){
        const thumb=await vidThumb(f);
        if(thumb)visionParts.push({type:'image_url',image_url:{url:thumb}});
      }
      visionParts.push({type:'text',text:'이 이미지/영상 썸네일을 한국 기업 소셜 미디어 콘텐츠 검수 관점에서 분석해주세요. 손 모양·제스처, 숫자 노출, 색상(정치적 색상 연상), 텍스트, 표현, 인물, 의상, 소품 등 리스크 요소를 구체적으로 설명해주세요. 200자 이내로 요약.'});

      try{
        const visionResp=await puter.ai.chat(visionParts,{model:'gpt-4o'});
        imageDesc=visionResp?.message?.content||visionResp?.toString()||'';
      }catch(ve){
        imageDesc=`이미지 ${imgFiles.length}개, 영상 ${vidFiles.length}개 첨부됨 (이미지 분석 불가: ${ve.message})`;
      }
    }

    const prompt=`당신은 한국 기업 소셜 미디어 콘텐츠 리스크 전문 검수 AI입니다.
아래 정보를 분석하고 반드시 JSON만 반환하세요. 마크다운 코드블록이나 다른 텍스트는 절대 포함하지 마세요.

【채널】${chNames[channel]}
【발행 예정일】${pubDate||'미입력'}
【캡션/본문】
${caption||'(없음)'}
${imageDesc?`【이미지/영상 분석 결과】\n${imageDesc}`:''}

【검수 기준 9가지】
1. 표현·문구: 오탈자, 유행어·밈 어원, 초성조합·대각선 읽기 숨은 의미, 맥락 결합(Context Collapse)
2. 혐오·차별·정치: 정치·정당·이념, 특정 집단 차별·비하, 사회적 약자·재난 소재화, 혐오·갈등 조장
3. 기념일·날짜 리스크: 세월호(4/16), 이태원(10/29), 5·18, 6·25 등 추모일 충돌
4. 다양성·포용성(DEI): 성별·연령·직업·국가 배제·편견
5. 이미지·비주얼: 손 모양(정당 기호 1~5번), 숫자 노출, 정당 대표색(빨강·파랑·노랑) 과도 노출, AI 가상인물 미표기
6. AI 콘텐츠: AI 포비아, 사과문 AI 작성
7. 저작권·출처: 출처 불명, 저작권·초상권
8. 선거 시즌: 손동작·숫자·정당색·선거 소재 Fun콘텐츠
9. 사회적 민감 이슈: 딥페이크 용어, 동물학대 연상, 국민 정서법 위반

반환 JSON:
{"score":0~100,"verdict":"발행 가능" 또는 "재검토 필요" 또는 "발행 보류","verdict_reason":"한 문장","checks":[{"category":"카테고리명","items":[{"label":"항목","status":"pass" 또는 "warn" 또는 "fail" 또는 "skip","level":"필수" 또는 "주의" 또는 "확인","note":"분석내용"}]}],"actions":["조치사항"]}`;

    const resp=await puter.ai.chat(prompt,{model:'gpt-4o-mini'});
    clearInterval(iv);

    const raw=resp?.message?.content||resp?.toString()||'';
    if(!raw)throw new Error('AI 응답이 비어있습니다.');

    const jsonMatch=raw.replace(/```json|```/g,'').trim().match(/\{[\s\S]*\}/);
    if(!jsonMatch)throw new Error('응답 파싱 오류. 다시 시도해주세요.');

    renderResult(JSON.parse(jsonMatch[0]));

  }catch(e){
    clearInterval(iv);
    const isAuth=e.message&&(e.message.includes('auth')||e.message.includes('login')||e.message.includes('sign'));
    document.getElementById('result').innerHTML=`<div class="card" style="text-align:center;padding:28px 20px">
      <i class="ti ti-alert-circle" style="font-size:34px;color:#C0392B;display:block;margin-bottom:10px"></i>
      <p style="color:#C0392B;font-weight:700;margin-bottom:6px">분석 중 오류가 발생했습니다</p>
      <p style="font-size:12px;color:#9CA3AF;margin-top:4px">${e.message}</p>
      ${isAuth?'<p style="font-size:13px;color:#374151;margin-top:10px">Puter 로그인이 필요합니다.<br>아래 버튼을 눌러 로그인 후 다시 시도해주세요.</p><button onclick="puter.auth.signIn().then(()=>location.reload())" style="margin-top:12px;padding:10px 20px;border-radius:8px;border:none;background:#1B3A6B;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">Puter 로그인</button>':''}
      <button class="btn-reset" onclick="resetForm()" style="margin-top:12px">다시 시도</button>
    </div>`;
  }
}

function renderResult(result){
  const score=Math.round(result.score||0);
  const bc=result.verdict==='발행 가능'?'pass':result.verdict==='재검토 필요'?'warn':'fail';
  const icon=bc==='pass'?'ti-circle-check':bc==='warn'?'ti-alert-triangle':'ti-ban';
  const si={pass:'ti-check',warn:'ti-alert-triangle',fail:'ti-x',skip:'ti-minus'};
  const lm={'필수':'req','주의':'caut','확인':'chk'};

  let ch='';
  (result.checks||[]).forEach(cat=>{
    const its=(cat.items||[]).map(it=>`
      <div class="ci ${it.status||'skip'}">
        <i class="ti ${si[it.status]||'ti-minus'} ci-ico"></i>
        <div>
          <div class="ci-lbl">${it.label} <span class="tag ${lm[it.level]||'chk'}">${it.level}</span></div>
          ${it.note?`<div class="ci-note">${it.note}</div>`:''}
        </div>
      </div>`).join('');
    ch+=`<div class="cgroup"><div class="cg-lbl">${cat.category}</div>${its}</div>`;
  });

  const acts=(result.actions||[]);
  const aH=acts.length?`<div class="abox"><div class="abox-ttl"><i class="ti ti-list-check"></i> 즉시 조치 필요 사항</div><ul class="alist">${acts.map(a=>`<li>${a}</li>`).join('')}</ul></div>`:'';

  document.getElementById('result').innerHTML=`
    <div class="card">
      <div class="banner ${bc}">
        <i class="ti ${icon} bico"></i>
        <div class="btxt">
          <div class="bv">${result.verdict}</div>
          <div class="br">${result.verdict_reason||''}</div>
        </div>
        <div class="bs">${score}<span class="bsu">점</span></div>
      </div>
      ${ch}
      ${aH}
      <p class="res-foot">AI 분석 결과는 참고용이며 최종 판단은 담당자·조직장 확인 후 결정하세요</p>
    </div>
    <button class="btn-reset" onclick="resetForm()"><i class="ti ti-refresh" style="font-size:13px;vertical-align:-2px;margin-right:4px"></i> 새 콘텐츠 검수하기</button>`;
}

function resetForm(){
  imgFiles.length=0;vidFiles.length=0;
  ['img-prev','vid-prev'].forEach(id=>document.getElementById(id).innerHTML='');
  ['img-box','vid-box'].forEach(id=>document.getElementById(id).classList.remove('on'));
  document.getElementById('caption').value='';
  document.getElementById('pubdate').value='';
  document.getElementById('result').innerHTML='';
  document.getElementById('img-in').value='';
  document.getElementById('vid-in').value='';
  updateBtn();
}

// Puter 초기화 확인
window.addEventListener('load',()=>{
  if(typeof puter==='undefined'){
    document.querySelector('.info-banner').innerHTML=`<i class="ti ti-wifi-off" style="font-size:20px;color:#C0392B;flex-shrink:0;margin-top:1px"></i><p style="color:#C0392B"><strong>인터넷 연결을 확인해주세요.</strong><br>이 시스템은 인터넷 연결이 필요합니다.</p>`;
  }
});
</script>
